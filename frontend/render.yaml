services:
  # Frontend Service
  - type: web
    name: healthcare-frontend
    env: python
    buildCommand: "echo 'No build needed for static files'"
    startCommand: "python -m http.server 3000"
    plan: free
    healthCheckPath: /
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index-standalone.html
      - type: rewrite
        source: /api/*
        destination: https://healthcare-backend-1f7x.onrender.com/api/*
